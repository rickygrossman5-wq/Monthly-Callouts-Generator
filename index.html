<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Amazon Ads Monthly Callout Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--s1:#111;--s2:#171717;--s3:#1f1f1f;
  --b1:#2a2a2a;--b2:#333;--b3:#444;
  --accent:#f97316;--accent2:#fb923c;
  --ok:#22c55e;--err:#ef4444;
  --t1:#f5f5f5;--t2:#aaa;--t3:#666;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 48px}
.wrap{width:100%;max-width:660px}
.hdr{text-align:center;margin-bottom:24px}
.hdr-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);color:var(--accent2);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:12px;font-family:var(--mono)}
.hdr h1{font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--t1)}
.hdr p{font-size:12px;color:var(--t2);margin-top:6px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:24px;width:100%}
.step-bar{display:flex;align-items:center;margin-bottom:24px}
.si{display:flex;align-items:center;gap:7px;flex:1}
.sd{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:var(--mono);flex-shrink:0;transition:all .2s;cursor:default}
.sd.off{background:var(--s3);color:var(--t3);border:1px solid var(--b1)}
.sd.on{background:var(--accent);color:#fff}
.sd.done{background:rgba(34,197,94,.15);color:var(--ok);border:1px solid rgba(34,197,94,.3);cursor:pointer}
.sd.done:hover{background:rgba(34,197,94,.25)}
.sl{font-size:11px;font-weight:500}
.sl.off{color:var(--t3)}.sl.on{color:var(--t1)}.sl.done{color:var(--ok);cursor:pointer}
.sline{flex:1;height:1px;background:var(--b1);margin:0 6px}
.sec-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px}
.sec-sub{font-size:11px;color:var(--t2);margin-bottom:18px}
.dz{border:1.5px dashed var(--b3);border-radius:10px;padding:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;margin-bottom:8px;background:var(--s2)}
.dz:hover{border-color:var(--accent);background:rgba(249,115,22,.06)}
.dz.drag{border-color:var(--accent);background:rgba(249,115,22,.1)}
.dz.ok{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.05)}
.dz.opt{border-style:dotted}
.di{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--s3);border:1px solid var(--b2)}
.dz.ok .di{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3)}
.dt{flex:1;min-width:0}
.dl{font-size:12px;font-weight:500;color:var(--t1)}
.dh{font-size:11px;color:var(--t3);margin-top:2px;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dz.ok .dh{color:var(--ok)}
.sec-divider{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--b1)}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:500;color:var(--t2);margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase;font-family:var(--mono)}
.field input,.field select{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:9px 11px;font-size:12px;color:var(--t1);font-family:var(--sans);outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#1f1f1f;color:var(--t1)}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--t2);pointer-events:none;font-size:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bullet-list{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:6px 8px;min-height:90px}
.bullet-list:focus-within{border-color:var(--accent)}
.bullet-row{display:flex;align-items:center;gap:6px;padding:3px 2px}
.bullet-dot{color:var(--accent2);font-size:13px;font-weight:600;flex-shrink:0;user-select:none;line-height:1;padding-top:1px}
.bullet-input{flex:1;background:transparent;border:none;outline:none;font-size:12px;color:var(--t1);font-family:var(--sans);padding:4px 0;line-height:1.5}
.bullet-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;line-height:1;flex-shrink:0;transition:color .15s}
.bullet-del:hover{color:var(--err)}
.add-bullet{display:flex;align-items:center;gap:6px;padding:5px 4px;cursor:pointer;color:var(--t3);font-size:11px;border-top:1px solid var(--b1);margin-top:4px;transition:color .15s;background:none;border-left:none;border-right:none;border-bottom:none;width:100%;font-family:var(--sans)}
.add-bullet:hover{color:var(--accent2)}
.btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:var(--sans);letter-spacing:.01em;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:#ea580c;transform:translateY(-1px)}
.btn-p:disabled{opacity:.4;transform:none;cursor:not-allowed}
.btn-s{background:var(--s3);color:var(--t1);border:1.5px solid var(--b3)}
.btn-s:hover{background:var(--b1);border-color:var(--t2);color:#fff}
.btn-o{background:transparent;color:var(--accent2);border:1.5px solid var(--accent);font-weight:600}
.btn-o:hover{background:rgba(249,115,22,.12);color:#fff;border-color:var(--accent2)}
.btn-ok{background:rgba(34,197,94,.15);color:var(--ok);border:1.5px solid rgba(34,197,94,.4);font-weight:600}
.btn-sm{padding:7px 16px;width:auto;font-size:12px}
.btn-row{display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-top:18px}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5;font-size:11px;padding:9px 11px;border-radius:7px;margin-top:12px;font-family:var(--mono)}
.out-brand{font-size:16px;font-weight:600;color:var(--t1)}
.out-mon{font-size:11px;color:var(--t3);margin-top:2px;font-family:var(--mono)}
.out-box{background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:16px;font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--t1);white-space:pre-wrap;overflow-y:auto;max-height:440px;margin-top:14px}
.out-box .sh{color:var(--accent2);font-weight:500}
.out-box .bl{color:#67e8f9}
.out-box .sb{color:#a5f3fc}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-badge">&#9889; pltfrm</div>
    <h1>Amazon Ads Monthly Callout</h1>
    <p>Upload campaign &amp; search term data to generate formatted performance callouts</p>
  </div>
  <div class="card" id="card">
    <div class="step-bar" id="step-bar"></div>
    <div id="content"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var MNS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function defaultMonth(){return{month:-1,year:new Date().getFullYear()};}
var dm=defaultMonth();
var S={
  step:1,
  campFile:null,spFile:null,sbFile:null,sqpPrevFile:null,sqpCurrFile:null,
  intake:{brand:'',dsp:'',kpiTarget:'',kpiActual:'',forecastRevenue:'',actualRevenue:''},
  calloutMonth:dm.month,calloutYear:dm.year,
  coreItems:[''],actionItems:[''],
  output:'',calloutMonthLabel:'',loading:false,error:'',copied:false
};

function cleanMoney(s){
  if(s===null||s===undefined)return 0;
  var str=String(s).replace(/[^\d.\-]/g,'').replace(/(?!^)-/g,'');
  var v=parseFloat(str);
  return(isNaN(v)||v<0)?0:v;
}
function safeAdd(a,b){return(isNaN(a)?0:a)+(isNaN(b)?0:b);}
function isBranded(n){return /\|\s*b\s*\|/i.test(String(n));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function normRows(rows){return rows.map(function(r){return Object.fromEntries(Object.entries(r).map(function(e){return[e[0].replace(/^\uFEFF/,'').trim(),e[1]];}));});}
function getCol(obj,cands){var keys=Object.keys(obj);for(var i=0;i<cands.length;i++){var f=keys.find(function(k){return k.toLowerCase()===cands[i].toLowerCase();});if(f!==undefined)return f;}return null;}
function isAuto(val){var v=String(val||'').toLowerCase().trim();return v==='automatic'||v==='auto'||v==='auto targeting'||v==='automatic targeting'||v==='auto - close match'||v==='auto - loose match'||v==='auto - substitutes'||v==='auto - complements'||v.startsWith('auto');}
function isManual(val){var v=String(val||'').toLowerCase().trim();return v==='manual'||v==='manual targeting'||v==='manual-targeting'||v.startsWith('manual');}

var ASIN=/B0[A-Z0-9]{8}/i,ASIN_X=/^B0[A-Z0-9]{8}$/i,MAN=new Set(['EXACT','PHRASE','BROAD']);

function toJSDate(val){
  if(!val&&val!==0)return null;
  if(val instanceof Date)return isNaN(val)?null:val;
  var s=String(val).trim();if(!s)return null;
  var mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(mdy){var d1=new Date(parseInt(mdy[3]),parseInt(mdy[1])-1,parseInt(mdy[2]));return isNaN(d1)?null:d1;}
  var ymd=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(ymd){var d2=new Date(parseInt(ymd[1]),parseInt(ymd[2])-1,parseInt(ymd[3]));return isNaN(d2)?null:d2;}
  var n=parseFloat(s);
  if(!isNaN(n)&&n>40000&&n<60000)return new Date(Math.round((n-25569)*86400000));
  var d3=new Date(s);return isNaN(d3)?null:d3;
}

function parseFile(file){
  return new Promise(function(res,rej){
    var fr=new FileReader();
    fr.onload=function(e){
      try{
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true,raw:false});
        var ws=wb.Sheets[wb.SheetNames[0]];
        res(normRows(XLSX.utils.sheet_to_json(ws,{defval:'',raw:false})));
      }catch(err){rej(err);}
    };
    fr.onerror=rej;fr.readAsArrayBuffer(file);
  });
}

function parseSQP(file){
  return new Promise(function(res,rej){
    var fr=new FileReader();
    fr.onload=function(e){
      try{
        var lines=e.target.result.split('\n');
        var wb=XLSX.read(lines.slice(1).join('\n'),{type:'string'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        var map={};
        rows.forEach(function(r){
          var q=String(r['Search Query']||'').toLowerCase().trim();
          if(!q)return;
          var imp=parseFloat(String(r['Impressions: Brand Share %']||'').replace(/[^0-9.]/g,''));
          var pur=parseFloat(String(r['Purchases: Brand Share %']||'').replace(/[^0-9.]/g,''));
          map[q]={imp:isNaN(imp)?null:imp,pur:isNaN(pur)?null:pur};
        });
        res(map);
      }catch(err){rej(err);}
    };
    fr.onerror=rej;fr.readAsText(file);
  });
}

function fmtShare(val){
  if(val===null||val===undefined||isNaN(val))return '';
  return val.toFixed(2)+'%';
}

function topNBCampaigns(nbC,avgROAS,nbSp){
  var pct=5,result=[];
  while(pct>=1){
    var threshold=nbSp*(pct/100);
    var q=nbC.filter(function(r){return r.roas>avgROAS&&r.spend>=threshold;}).sort(function(a,b){return b.roas-a.roas||b.spend-a.spend;});
    if(q.length>=3){result=q.slice(0,3);break;}
    pct--;
  }
  if(result.length<3){
    var used=new Set(result.map(function(r){return r.name;}));
    var fill=nbC.filter(function(r){return r.spend>=50&&!used.has(r.name);}).sort(function(a,b){return b.roas-a.roas||b.spend-a.spend;});
    result=result.concat(fill).slice(0,3);
  }
  return result;
}

async function compute(){
  var campFile=S.campFile,spFile=S.spFile,sbFile=S.sbFile;
  var sqpPrevFile=S.sqpPrevFile,sqpCurrFile=S.sqpCurrFile;
  var intake=S.intake,coreItems=S.coreItems,actionItems=S.actionItems;
  var calloutMonth=S.calloutMonth,calloutYear=S.calloutYear;

  var results=await Promise.all([parseFile(campFile),parseFile(spFile),sbFile?parseFile(sbFile):Promise.resolve([])]);
  var sqpResults=await Promise.all([sqpPrevFile?parseSQP(sqpPrevFile):Promise.resolve(null),sqpCurrFile?parseSQP(sqpCurrFile):Promise.resolve(null)]);
  var campRaw=results[0],spRaw=results[1],sbRaw=results[2];
  var sqpPrev=sqpResults[0],sqpCurr=sqpResults[1];

  var c0=campRaw[0]||{};
  var cC=getCol(c0,['Country','Marketplace']);
  var cN=getCol(c0,['Campaign name','Campaign Name','Campaigns']);
  var cSp=getCol(c0,['Total cost','Total cost (converted)','Spend']);
  var cSa=getCol(c0,['Sales','Sales (converted)','7 Day Total Sales','14 Day Total Sales']);
  var cT=getCol(c0,['Targeting','Targeting Type','Campaign targeting type','Campaign Targeting Type']);
  var cD=getCol(c0,['Campaign start date','Created Date','Start Date','Launch Date']);

  var camp=campRaw;
  if(cC)camp=camp.filter(function(r){return String(r[cC]).trim().toLowerCase()==='united states';});
  if(camp.length===0)camp=campRaw;

  camp=camp.map(function(r){return{
    name:String(r[cN]||''),spend:cleanMoney(r[cSp]),sales:cleanMoney(r[cSa]),
    targetingRaw:String(r[cT]||''),startRaw:r[cD]!=null?r[cD]:'',branded:isBranded(String(r[cN]||''))
  };});

  var totalPPC=camp.reduce(function(s,r){return safeAdd(s,r.spend);},0);
  var dsp=cleanMoney(intake.dsp),totalAd=safeAdd(totalPPC,dsp);
  var nbSpTot=camp.filter(function(r){return !r.branded;}).reduce(function(s,r){return safeAdd(s,r.spend);},0);
  var bSpPrimary=camp.filter(function(r){return r.branded;}).reduce(function(s,r){return safeAdd(s,r.spend);},0);
  var bSp=bSpPrimary>0?bSpPrimary:safeAdd(totalPPC,-nbSpTot);
  var autoSp=camp.filter(function(r){return isAuto(r.targetingRaw);}).reduce(function(s,r){return safeAdd(s,r.spend);},0);
  var manSp=camp.filter(function(r){return isManual(r.targetingRaw);}).reduce(function(s,r){return safeAdd(s,r.spend);},0);

  var nbC=camp.filter(function(r){return !r.branded&&r.spend>0;}).map(function(r){return{name:r.name,spend:r.spend,sales:r.sales,roas:r.spend>0?r.sales/r.spend:0};});
  var nbSa=nbC.reduce(function(s,r){return safeAdd(s,r.sales);},0);
  var nbSp=nbC.reduce(function(s,r){return safeAdd(s,r.spend);},0);
  var avgROAS=nbSp>0?nbSa/nbSp:0;

  var topNB=topNBCampaigns(nbC,avgROAS,nbSp);

  var wNB=nbC.filter(function(r){return r.spend>=50;}).sort(function(a,b){return a.roas-b.roas||b.spend-a.spend;});
  if(wNB.length<3){var u2=new Set(wNB.map(function(r){return r.name;}));var f2=nbC.filter(function(r){return r.spend>=25&&!u2.has(r.name);}).sort(function(a,b){return a.roas-b.roas;});wNB=wNB.concat(f2).slice(0,3);}
  else wNB=wNB.slice(0,3);

  var calS=new Date(calloutYear,calloutMonth,1);
  var calE=new Date(calloutYear,calloutMonth+1,0,23,59,59);
  var calLabel=MNS[calloutMonth]+' '+calloutYear;
  var seenN=new Set(),newCamps=[];
  if(cD){
    camp.slice().sort(function(a,b){
      var ta=(toJSDate(a.startRaw)||{getTime:function(){return Infinity;}}).getTime();
      var tb=(toJSDate(b.startRaw)||{getTime:function(){return Infinity;}}).getTime();
      return ta-tb||a.name.localeCompare(b.name);
    }).forEach(function(r){
      if(!r.startRaw||seenN.has(r.name))return;
      var d=toJSDate(r.startRaw);
      if(d&&d>=calS&&d<=calE){newCamps.push(r.name);seenN.add(r.name);}
    });
  }

  var nbCampNames=new Set(nbC.map(function(r){return r.name.toLowerCase().trim();}));

  var s0=spRaw[0]||{};
  var sCo=getCol(s0,['Country','Marketplace']);
  var spF=sCo?spRaw.filter(function(r){return String(r[sCo]).trim().toLowerCase()==='united states';}):spRaw;
  if(sCo&&spF.length===0)spF=spRaw;
  var sCS=getCol(s0,['Customer Search Term','Search Term']),sMT=getCol(s0,['Match Type']);
  var sTg=getCol(s0,['Targeting','Targeting Expression']),sSp=getCol(s0,['Spend']),sSa=getCol(s0,['7 Day Total Sales','14 Day Total Sales']);
  var sCN=getCol(s0,['Campaign Name','Campaign name']);

  // All SP rows (branded + NB) — used for match type and PAT/KW splits
  var spAll=spF.map(function(r){return{cst:String(r[sCS]||''),mt:String(r[sMT]||'').toUpperCase().trim(),tg:String(r[sTg]||''),sp:cleanMoney(r[sSp]),sa:cleanMoney(r[sSa])};});
  // NB-only SP rows — used for top search terms
  var spNB=spF.filter(function(r){return nbCampNames.has(String(r[sCN]||'').toLowerCase().trim());})
    .map(function(r){return{cst:String(r[sCS]||''),mt:String(r[sMT]||'').toUpperCase().trim(),tg:String(r[sTg]||''),sp:cleanMoney(r[sSp]),sa:cleanMoney(r[sSa])};});

  var sbAll=[],sbNB=[];
  if(sbRaw.length>0){
    var b0=sbRaw[0];
    var bCN=getCol(b0,['Campaign Name','Campaign name']);
    var bTg=getCol(b0,['Targeting','Targeting Expression']),bMT=getCol(b0,['Match Type']),bSp2=getCol(b0,['Spend']),bSa=getCol(b0,['14 Day Total Sales','7 Day Total Sales']);
    sbRaw.forEach(function(r){
      var row={cst:String(r[bTg]||''),mt:String(r[bMT]||'').toUpperCase().trim(),tg:String(r[bTg]||''),sp:cleanMoney(r[bSp2]),sa:cleanMoney(r[bSa])};
      sbAll.push(row);
      if(nbCampNames.has(String(r[bCN]||'').toLowerCase().trim()))sbNB.push(row);
    });
  }

  function mapComb(rows){
    return rows.map(function(r){
      var t=r.tg.toLowerCase(),c=r.cst.toLowerCase();
      var isPAT=ASIN.test(t)||t.includes('asin=')||t.includes('category=')||ASIN.test(c);
      return{cst:r.cst,mt:r.mt,tg:r.tg,sp:r.sp,sa:r.sa,isPAT:isPAT,isKW:MAN.has(r.mt)&&!isPAT};
    });
  }

  // combAll = all campaigns → match type, PAT/KW splits
  var combAll=mapComb(spAll.concat(sbAll));
  // combNB = NB campaigns only → top search terms
  var combNB=mapComb(spNB.concat(sbNB));

  var patSp=combAll.filter(function(r){return r.isPAT;}).reduce(function(s,r){return safeAdd(s,r.sp);},0);
  var kwSp=combAll.filter(function(r){return r.isKW;}).reduce(function(s,r){return safeAdd(s,r.sp);},0);
  var pkD=safeAdd(patSp,kwSp);
  var mSTR=combAll.filter(function(r){return MAN.has(r.mt);});
  var mtD=mSTR.reduce(function(s,r){return safeAdd(s,r.sp);},0);
  var exSp=mSTR.filter(function(r){return r.mt==='EXACT';}).reduce(function(s,r){return safeAdd(s,r.sp);},0);
  var phSp=mSTR.filter(function(r){return r.mt==='PHRASE';}).reduce(function(s,r){return safeAdd(s,r.sp);},0);
  var brSp=mSTR.filter(function(r){return r.mt==='BROAD';}).reduce(function(s,r){return safeAdd(s,r.sp);},0);

  var bLow=intake.brand.toLowerCase().replace(/[-\s]/g,'');
  var nbSTR=combNB.filter(function(r){var c=r.cst.toLowerCase().replace(/[-\s]/g,'');return !c.includes(bLow)&&!ASIN_X.test(r.cst)&&r.cst.trim()!=='';});
  var cA={};
  nbSTR.forEach(function(r){if(!cA[r.cst])cA[r.cst]={sp:0,sa:0};cA[r.cst].sp=safeAdd(cA[r.cst].sp,r.sp);cA[r.cst].sa=safeAdd(cA[r.cst].sa,r.sa);});
  var topT=Object.entries(cA).map(function(e){return{cst:e[0],sp:e[1].sp,sa:e[1].sa};}).sort(function(a,b){return b.sp-a.sp;}).slice(0,3);

  function P(v,d){if(isNaN(v)||isNaN(d)||d===0)return '0.00%';return(v/d*100).toFixed(2)+'%';}
  function M(v){return '$'+Math.round(isNaN(v)?0:v).toLocaleString();}
  function R(v){return(isNaN(v)?0:v).toFixed(2);}
  function fR(v){var n=cleanMoney(v);return n>0?M(n):v;}

  var cBullets=coreItems.filter(function(b){return b.trim();});
  var aBullets=actionItems.filter(function(b){return b.trim();});

  // ── Output builder ──
  var out='';
  function SEC(s){out+=s+'\n';}     // section header, no blank line
  function B(s){out+='* '+s+'\n';}  // top-level bullet
  function SB(s){out+='   * '+s+'\n';} // sub-bullet

  SEC('==== CORE STRATEGIES ====');
  if(cBullets.length===0)B('N/A');else cBullets.forEach(function(b){B(b.trim());});

  SEC('==== PACING ====');
  B('Monthly Goal: '+intake.kpiTarget);
  B('Forecasted Revenue: '+fR(intake.forecastRevenue));
  B('Actual Monthly Outcome: '+intake.kpiActual);
  B('Actual Revenue: '+fR(intake.actualRevenue));
  B('Total Non-branded ROAS: '+R(avgROAS));

  SEC('==== TOP SPENDING SEARCH TERMS (NON-BRANDED ONLY) AND PURCHASE SHARE ====');
  topT.forEach(function(t){
    var key=t.cst.toLowerCase().trim();
    var currData=sqpCurr?sqpCurr[key]:null;
    var prevData=sqpPrev?sqpPrev[key]:null;
    var hasCurr=currData&&(currData.imp!==null||currData.pur!==null);
    var hasPrev=prevData&&(prevData.imp!==null||prevData.pur!==null);
    if(sqpCurrFile||sqpPrevFile){
      var currLine=t.cst+' — Spend: '+M(t.sp)+'; Revenue: '+M(t.sa);
      if(hasCurr){
        var parts=[];
        if(currData.imp!==null)parts.push('Impression Share: '+fmtShare(currData.imp));
        if(currData.pur!==null)parts.push('Purchase Share: '+fmtShare(currData.pur));
        if(parts.length)currLine+=' — '+parts.join(' | ');
      }
      B(currLine);
      if(hasPrev){
        var prevParts=[];
        if(prevData.imp!==null)prevParts.push('Impression Share: '+fmtShare(prevData.imp));
        if(prevData.pur!==null)prevParts.push('Purchase Share: '+fmtShare(prevData.pur));
        if(prevParts.length)SB('Last Month: '+prevParts.join(' | '));
      } else {
        SB('Last Month:');
      }
    } else {
      B(t.cst+' — Spend: '+M(t.sp)+'; Revenue: '+M(t.sa)+' — Impression/Purchase Share:');
      SB('Last Month:');
    }
  });

  SEC('==== SPEND BREAKDOWN ====');
  B('Branded vs. Non-branded');
  SB('Branded: '+P(bSp,totalPPC));
  SB('Non-branded: '+P(nbSpTot,totalPPC));
  B('Product/Category Targeting vs. Keyword Targeting');
  SB('Product/Category: '+P(patSp,pkD));
  SB('Keyword: '+P(kwSp,pkD));
  B('Match Type');
  SB('Exact: '+P(exSp,mtD));
  SB('Phrase: '+P(phSp,mtD));
  SB('Broad: '+P(brSp,mtD));
  B('Auto Campaign vs Manual Campaign');
  SB('Auto: '+P(autoSp,totalPPC));
  SB('Manual: '+P(manSp,totalPPC));
  if(dsp>0){
    B('DSP vs PPC');
    SB('DSP: '+P(dsp,totalAd));
    SB('PPC: '+P(totalPPC,totalAd));
  }

  SEC('==== TOP NON-BRANDED CAMPAIGNS ====');
  topNB.forEach(function(c){B(c.name+': ROAS '+R(c.roas)+' | Spend: '+M(c.spend));});

  SEC('==== WORST NON-BRANDED CAMPAIGNS ====');
  wNB.forEach(function(c){B(c.name+': ROAS '+R(c.roas)+' | Spend: '+M(c.spend));});

  SEC('==== NEW CAMPAIGNS CREATED DURING THE MONTH ====');
  if(newCamps.length===0)B('None');else newCamps.forEach(function(n){B(n);});

  SEC('==== STRATEGIC ACTION ITEMS FOR NEXT MONTH ====');
  if(aBullets.length===0)B('N/A');else aBullets.forEach(function(b){B(b.trim());});

  return{output:out.trim(),calloutMonthLabel:calLabel};
}

function render(){renderBar();renderContent();}

function renderBar(){
  var steps=['Upload Files','Brand Info','Output'];
  var bar=document.getElementById('step-bar');bar.innerHTML='';
  steps.forEach(function(lbl,i){
    var n=i+1,st=S.step>n?'done':S.step===n?'on':'off';
    var dot=document.createElement('div');dot.className='si';
    dot.innerHTML='<div class="sd '+st+'" data-goto="'+n+'">'+(st==='done'?'&#10003;':n)+'</div><span class="sl '+st+'" data-goto="'+n+'">'+lbl+'</span>';
    bar.appendChild(dot);
    if(i<steps.length-1){var ln=document.createElement('div');ln.className='sline';bar.appendChild(ln);}
  });
  bar.querySelectorAll('[data-goto]').forEach(function(el){
    el.addEventListener('click',function(){var g=parseInt(el.dataset.goto);if(g<S.step){S.error='';S.step=g;render();}});
  });
}

function renderContent(){
  var el=document.getElementById('content');
  if(S.step===1)el.innerHTML=step1();
  else if(S.step===2)el.innerHTML=step2();
  else el.innerHTML=step3();
  bind();
}

function dz(id,lbl,file,opt){
  opt=opt||false;
  return'<div class="dz '+(file?'ok':'')+' '+(opt?'opt':'')+'" data-dz="'+id+'">'+
    '<div class="di">'+(file?'&#10003;':'&#9633;')+'</div>'+
    '<div class="dt"><div class="dl">'+lbl+'</div><div class="dh">'+(file?esc(file.name):'Click or drag to upload')+'</div></div>'+
    '<input type="file" id="fi-'+id+'" accept="'+(id==='camp'?'.csv':'.xlsx,.xls,.csv')+'" style="display:none">'+
  '</div>';
}

function bulletListHTML(id,items){
  var rows=items.map(function(val,i){
    return'<div class="bullet-row" data-list="'+id+'" data-idx="'+i+'">'+
      '<span class="bullet-dot">&#8226;</span>'+
      '<input class="bullet-input" data-list="'+id+'" data-idx="'+i+'" value="'+esc(val)+'" type="text">'+
      (items.length>1?'<button class="bullet-del" data-list="'+id+'" data-idx="'+i+'" title="Remove">&#215;</button>':'')+
    '</div>';
  }).join('');
  return'<div class="bullet-list" id="bl-'+id+'">'+rows+'<button class="add-bullet" data-list="'+id+'">+ Add bullet</button></div>';
}

function monthSelector(){
  var mOpts='<option value="-1" disabled'+(S.calloutMonth===-1?' selected':'')+'>Select month...</option>';
  MNS.forEach(function(m,i){mOpts+='<option value="'+i+'"'+(S.calloutMonth===i?' selected':'')+'>'+m+'</option>';});
  return'<div class="field" style="margin-bottom:12px">'+
    '<label>Callout Month *</label>'+
    '<div class="sel-wrap"><select id="sel-month">'+mOpts+'</select></div>'+
  '</div>';
}

function step1(){
  return'<div class="sec-title">Upload Files</div>'+
  '<div class="sec-sub">US data only</div>'+
  dz('camp','Campaigns File (.csv)',S.campFile)+
  dz('sp','SP Search Term Report (.xlsx)',S.spFile)+
  dz('sb','SB Search Term Report (.xlsx)',S.sbFile)+
  '<div class="sec-divider">Optional — Search Query Performance</div>'+
  dz('sqpPrev','SQP Report — Previous Month (.csv)',S.sqpPrevFile,true)+
  dz('sqpCurr','SQP Report — Current Month (.csv)',S.sqpCurrFile,true)+
  (S.error?'<div class="err">'+esc(S.error)+'</div>':'')+
  '<button class="btn btn-p" id="s1next" style="margin-top:18px">Continue &#8594;</button>';
}

function step2(){
  var I=S.intake;
  function fi(key,lbl){return'<div class="field"><label>'+lbl+'</label><input data-key="'+key+'" value="'+esc(I[key])+'"></div>';}
  return'<div class="sec-title">Brand Info</div><div class="sec-sub">Fill in the details for this month\'s callout</div>'+
  fi('brand','Brand Name *')+fi('dsp','DSP Spend This Month')+
  monthSelector()+
  '<div class="frow">'+fi('kpiTarget','KPI Target *')+fi('kpiActual','KPI Actual *')+'</div>'+
  '<div class="frow">'+fi('forecastRevenue','Forecasted Revenue *')+fi('actualRevenue','Actual Revenue *')+'</div>'+
  '<div class="field"><label>Core Strategies for the Month</label>'+bulletListHTML('core',S.coreItems)+'</div>'+
  '<div class="field"><label>Strategic Action Items for Next Month</label>'+bulletListHTML('action',S.actionItems)+'</div>'+
  (S.error?'<div class="err">'+esc(S.error)+'</div>':'')+
  '<div class="btn-row"><button class="btn btn-s" id="s2back">&#8592; Back</button>'+
  '<button class="btn btn-p" id="s2gen"'+(S.loading?' disabled':'')+'>'+
  (S.loading?'<span class="spin"></span> Processing...':'Generate Callout')+'</button></div>';
}

function hl(text){
  return esc(text)
    .replace(/(====.*?====)/g,'<span class="sh">$1</span>')
    .replace(/(^\* )/gm,'<span class="bl">* </span>')
    .replace(/(^   \* )/gm,'<span class="sb">   * </span>');
}

function step3(){
  return'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">'+
    '<div><div class="out-brand">'+esc(S.intake.brand)+'</div><div class="out-mon">'+S.calloutMonthLabel+' callout</div></div>'+
    '<button class="btn btn-o btn-sm'+(S.copied?' btn-ok':'')+'" id="copybtn" style="flex-shrink:0">'+(S.copied?'&#10003; Copied!':'Copy All')+'</button>'+
  '</div>'+
  '<div class="out-box">'+hl(S.output)+'</div>'+
  '<div style="display:flex;gap:10px;margin-top:16px">'+
    '<button class="btn btn-s" id="s3back" style="max-width:160px">&#8592; Edit Info</button>'+
    '<button class="btn btn-o" id="nextbrand">Next Brand &#8594;</button>'+
  '</div>';
}

function bind(){
  if(S.step===1){
    ['camp','sp','sb','sqpPrev','sqpCurr'].forEach(function(id){
      var zone=document.querySelector('[data-dz="'+id+'"]'),inp=document.getElementById('fi-'+id);
      if(!zone||!inp)return;
      zone.addEventListener('click',function(){inp.click();});
      zone.addEventListener('dragover',function(e){e.preventDefault();zone.classList.add('drag');});
      zone.addEventListener('dragleave',function(){zone.classList.remove('drag');});
      zone.addEventListener('drop',function(e){e.preventDefault();zone.classList.remove('drag');if(e.dataTransfer.files[0])setF(id,e.dataTransfer.files[0]);});
      inp.addEventListener('change',function(e){if(e.target.files[0])setF(id,e.target.files[0]);});
    });
    var s1n=document.getElementById('s1next');
    if(s1n)s1n.addEventListener('click',function(){
      if(!S.campFile||!S.spFile){S.error='Campaigns and SP STR files are required.';render();return;}
      S.error='';S.step=2;render();
    });
  }
  if(S.step===2){
    document.querySelectorAll('[data-key]').forEach(function(el){el.addEventListener('input',function(e){S.intake[e.target.dataset.key]=e.target.value;});});
    var sm=document.getElementById('sel-month');
    if(sm)sm.addEventListener('change',function(){S.calloutMonth=parseInt(this.value);});
    document.querySelectorAll('.bullet-input').forEach(function(inp){
      inp.addEventListener('input',function(e){var list=e.target.dataset.list,idx=parseInt(e.target.dataset.idx);if(list==='core')S.coreItems[idx]=e.target.value;else S.actionItems[idx]=e.target.value;});
      inp.addEventListener('keydown',function(e){
        if(e.key==='Enter'){e.preventDefault();var list=e.target.dataset.list,idx=parseInt(e.target.dataset.idx);var arr=list==='core'?S.coreItems:S.actionItems;arr.splice(idx+1,0,'');render();setTimeout(function(){var rows=document.querySelectorAll('[data-list="'+list+'"].bullet-input');if(rows[idx+1])rows[idx+1].focus();},0);}
        if(e.key==='Backspace'&&e.target.value===''){e.preventDefault();var list=e.target.dataset.list,idx=parseInt(e.target.dataset.idx);var arr=list==='core'?S.coreItems:S.actionItems;if(arr.length>1){arr.splice(idx,1);render();setTimeout(function(){var rows=document.querySelectorAll('[data-list="'+list+'"].bullet-input');if(rows[Math.max(0,idx-1)])rows[Math.max(0,idx-1)].focus();},0);}}
      });
    });
    document.querySelectorAll('.bullet-del').forEach(function(btn){btn.addEventListener('click',function(e){var list=e.target.dataset.list,idx=parseInt(e.target.dataset.idx);var arr=list==='core'?S.coreItems:S.actionItems;if(arr.length>1){arr.splice(idx,1);render();}});});
    document.querySelectorAll('.add-bullet').forEach(function(btn){btn.addEventListener('click',function(e){var list=e.target.dataset.list;if(list==='core')S.coreItems.push('');else S.actionItems.push('');render();setTimeout(function(){var rows=document.querySelectorAll('[data-list="'+list+'"].bullet-input');if(rows.length)rows[rows.length-1].focus();},0);});});
    var s2b=document.getElementById('s2back');if(s2b)s2b.addEventListener('click',function(){S.error='';S.step=1;render();});
    var s2g=document.getElementById('s2gen');if(s2g)s2g.addEventListener('click',gen);
  }
  if(S.step===3){
    var cb=document.getElementById('copybtn');
    if(cb)cb.addEventListener('click',function(){navigator.clipboard.writeText(S.output).then(function(){S.copied=true;render();setTimeout(function(){S.copied=false;render();},2000);});});
    var s3b=document.getElementById('s3back');if(s3b)s3b.addEventListener('click',function(){S.error='';S.step=2;render();});
    var nb=document.getElementById('nextbrand');
    if(nb)nb.addEventListener('click',function(){
      var d=defaultMonth();
      S={step:1,campFile:null,spFile:null,sbFile:null,sqpPrevFile:null,sqpCurrFile:null,intake:{brand:'',dsp:'',kpiTarget:'',kpiActual:'',forecastRevenue:'',actualRevenue:''},calloutMonth:d.month,calloutYear:d.year,coreItems:[''],actionItems:[''],output:'',calloutMonthLabel:'',loading:false,error:'',copied:false};
      render();
    });
  }
}

function setF(id,file){
  if(id==='camp')S.campFile=file;
  else if(id==='sp')S.spFile=file;
  else if(id==='sb')S.sbFile=file;
  else if(id==='sqpPrev')S.sqpPrevFile=file;
  else if(id==='sqpCurr')S.sqpCurrFile=file;
  S.error='';render();
}

async function gen(){
  var I=S.intake;
  if(!I.brand.trim()){S.error='Brand name is required.';render();return;}
  if(S.calloutMonth===-1){S.error='Please select a callout month.';render();return;}
  if(!I.kpiTarget.trim()||!I.kpiActual.trim()){S.error='KPI target and actual are required.';render();return;}
  if(!I.forecastRevenue.trim()||!I.actualRevenue.trim()){S.error='Revenue figures are required.';render();return;}
  S.error='';S.loading=true;render();
  try{var r=await compute();S.output=r.output;S.calloutMonthLabel=r.calloutMonthLabel;S.step=3;}
  catch(e){S.error='Processing error: '+e.message;}
  finally{S.loading=false;render();}
}

render();
</script>
</body>
</html>
